name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lean:
    name: Lean build (no sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against sorry/admit
        run: |
          if grep -rn "sorry\|admit" RiemannVenue/ RiemannVenue.lean; then
            echo "::error::sorry/admit found in Lean sources"
            exit 1
          fi

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake packages
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Fetch mathlib olean cache
        run: lake exe cache get

      - name: Build
        run: lake build

  notebooks:
    name: Execute notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate and execute notebooks
        run: python scripts/check_notebooks.py --execute
      # Drift gate: executed notebooks are committed textual/numeric evidence,
      # so rerunning them must not change their tracked JSON. Plot image bytes
      # are normalized out here and covered by the figure drift gate below.
      - name: Notebook drift gate
        run: git diff --exit-code -- notebooks/*.ipynb
      - name: Regenerate figures
        run: python scripts/export_figures.py
      # Drift gate: the five deterministic claim-figures must byte-match the
      # committed artifacts (requirements.txt is pinned exactly to make
      # matplotlib output reproducible). Expedition figures (lambda-min-*)
      # are long-compute artifacts regenerated by their own scripts and are
      # deliberately not gated here — see scripts/export_figures.py docstring.
      - name: Figure drift gate
        run: |
          git diff --exit-code -- \
            figures/gcd-kernel-spectrum.png \
            figures/euler-shadows.png \
            figures/nonradon-mass.png \
            figures/kakutani-threshold.png \
            figures/radial-derivative.png

  exhibits:
    name: Compile Typst exhibits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        run: |
          curl -sSfL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          echo "$PWD/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
      # Liberation Sans, matching the environment the committed PDF was
      # rendered in (see exhibits/README.md — Noto Sans is the oracle's font
      # but is deliberately NOT installed, so CI and the committed artifact
      # share a font environment). This job is a compile smoke test; the PDF
      # is environment-sensitive and is not byte-gated.
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation
      - name: Compile exhibit sheets (smoke test)
        run: |
          if [ -f exhibits/exhibit-sheets.typ ]; then
            typst compile exhibits/exhibit-sheets.typ /tmp/exhibit-sheets-ci.pdf
          else
            echo "no Typst sources yet; skipping"
          fi
      - name: Compile second-edition motion (smoke test)
        run: typst compile --root . essay/motion.typ /tmp/motion-ci.pdf

  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Check the actual change diff, not the (always-clean) working tree.
      # Binary artifacts are excluded via .gitattributes.
      - name: Whitespace / conflict markers on the change diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
          fi
          git diff --check "$BASE" HEAD
