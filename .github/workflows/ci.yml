name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lean:
    name: Lean build (no sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against sorry/admit
        run: |
          if grep -rnw "sorry\|admit" RiemannVenue/ RiemannVenue.lean; then
            echo "::error::sorry/admit found in Lean sources"
            exit 1
          fi

      - name: Install elan
        run: |
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain "$(cat lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache lake packages
        uses: actions/cache@v4
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: lake-${{ runner.os }}-

      - name: Fetch mathlib olean cache
        run: lake exe cache get

      - name: Build
        run: lake build

      - name: Terminal axiom and dependency audit
        run: python3 scripts/check_axioms.py

  notebooks:
    name: Execute notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Boundary finite-part probe drift gate
        run: |
          python scripts/probe_boundary_finite_part.py > /tmp/boundary-finite-part-cnd.txt
          diff -u artifacts/boundary-finite-part-cnd.txt /tmp/boundary-finite-part-cnd.txt
      - name: Localized phased reconstruction smoke test
        run: |
          python scripts/export_localized_phased_certificate.py \
            /tmp/localized-phased-candidate.json \
            --evaluation-samples 4001
      - name: Localized phased interval-packet drift gate
        run: |
          python scripts/generate_computed_phased_interval_certificate.py \
            --output /tmp/BoundaryComputedPhasedIntervalCertificate.lean
          diff -u \
            RiemannVenue/Venue/BoundaryComputedPhasedIntervalCertificate.lean \
            /tmp/BoundaryComputedPhasedIntervalCertificate.lean
      - name: Localized phased derivative compiler drift gate
        run: |
          python scripts/generate_computed_phased_derivative_certificate.py \
            --output /tmp/BoundaryComputedPhasedDerivativeCertificate.lean
          diff -u \
            RiemannVenue/Venue/BoundaryComputedPhasedDerivativeCertificate.lean \
            /tmp/BoundaryComputedPhasedDerivativeCertificate.lean
      - name: Generated-family inventory checker tests
        run: python scripts/test_check_generated_family.py
      - name: Standard-bump high-jet compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-bump-jets
          python scripts/generate_computed_phased_transform_bump_jets.py \
            --output-dir /tmp/computed-phased-bump-jets
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-bump-jets \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedTransformBumpJets*.lean'
      - name: Standard-bump global-bound compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-bump-global-bounds
          python scripts/generate_computed_phased_transform_bump_global_bounds.py \
            --output-dir /tmp/computed-phased-bump-global-bounds
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-bump-global-bounds \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedTransformBumpGlobalBound[0-9]*.lean'
      - name: Standard-bump flat-tail sign compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-bump-tail-signs
          python scripts/generate_computed_phased_transform_bump_tail_signs.py \
            --output-dir /tmp/computed-phased-bump-tail-signs
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-bump-tail-signs \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedTransformBumpTailSign[0-9]*.lean'
      - name: First derivative-cell compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-derivative-cell0
          mkdir -p /tmp/computed-phased-derivative-cell0
          python scripts/generate_computed_phased_derivative_cell0_leaves.py \
            --output-dir /tmp/computed-phased-derivative-cell0
          python scripts/generate_computed_phased_derivative_cell0_groups.py \
            --output-dir /tmp/computed-phased-derivative-cell0
          python scripts/generate_computed_phased_derivative_cell0_weighted.py \
            --output-dir /tmp/computed-phased-derivative-cell0
          python scripts/generate_computed_phased_derivative_regime_probes.py \
            --output /tmp/computed-phased-derivative-cell0/BoundaryComputedPhasedDerivativeRegimeProbes.lean
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-derivative-cell0 \
            --tracked-dir RiemannVenue/Venue \
            --pattern BoundaryComputedPhasedDerivativeCell0BumpPolynomials.lean \
            --pattern 'BoundaryComputedPhasedDerivativeCell0Translation*.lean' \
            --pattern BoundaryComputedPhasedDerivativeCell0Leaves.lean \
            --pattern 'BoundaryComputedPhasedDerivativeCell0PointOrder*Groups.lean' \
            --pattern 'BoundaryComputedPhasedDerivativeCell0CellOrder*Groups.lean' \
            --pattern BoundaryComputedPhasedDerivativeCell0Weighted.lean \
            --pattern BoundaryComputedPhasedDerivativeRegimeProbes.lean
      - name: Standard-bump quadrature compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-bump-quadrature
          python scripts/generate_computed_phased_bump_quadrature.py \
            --output-dir /tmp/computed-phased-bump-quadrature
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-bump-quadrature \
            --tracked-dir RiemannVenue/Venue \
            --pattern BoundaryComputedPhasedBumpQuadratureTable.lean \
            --pattern BoundaryComputedPhasedBumpQuadratureSelectors.lean \
            --pattern 'BoundaryComputedPhasedBumpQuadratureLeavesN*Block*.lean'
      - name: Canonical-bump transform packet drift gate
        run: python scripts/generate_canonical_bump_transform_packets.py --check
      - name: Narrow outer midpoint shard drift gate
        run: python scripts/generate_computed_phased_base_outer_midpoints.py --check
      - name: Adaptive outer compact compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-outer-compact
          python scripts/generate_computed_phased_base_outer_compact_shards.py \
            --output-dir /tmp/computed-phased-base-outer-compact
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-outer-compact \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseOuterCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseOuterCompactPointTrigs*.lean' \
            --pattern 'BoundaryComputedPhasedBaseOuterCompactPointKernels*.lean' \
            --pattern BoundaryComputedPhasedBaseOuterCompactTrigSteps.lean \
            --pattern BoundaryComputedPhasedBaseOuterCompactKernelSteps.lean \
            --pattern 'BoundaryComputedPhasedBaseOuterCompactVariationCell*.lean' \
            --pattern BoundaryComputedPhasedBaseOuterCompactVariations.lean \
            --pattern 'BoundaryComputedPhasedBaseOuterCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseOuterCompactTaylorPackets.lean \
            --pattern BoundaryComputedPhasedBaseOuterCompactShards.lean
      - name: Adaptive middle compact compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-middle-compact
          python scripts/generate_computed_phased_base_middle_compact_shards.py \
            --output-dir /tmp/computed-phased-base-middle-compact
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-middle-compact \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseMiddleCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseMiddleCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseMiddleCompactFixedShifts.lean \
            --pattern BoundaryComputedPhasedBaseMiddleTailTaylor.lean \
            --pattern BoundaryComputedPhasedBaseMiddleCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseMiddleCompactTaylorPackets.lean
      - name: Recursive three-block compact compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-lower-three-compact
          python scripts/generate_computed_phased_base_lower_three_compact_shards.py \
            --output-dir /tmp/computed-phased-base-lower-three-compact
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-lower-three-compact \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseLowerThreeCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseLowerThreeCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseLowerThreeCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseLowerThreeCompactTaylorPackets.lean
      - name: Recursive four-block compact compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-lower-four-compact
          python scripts/generate_computed_phased_base_lower_four_compact_shards.py \
            --output-dir /tmp/computed-phased-base-lower-four-compact
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-lower-four-compact \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseLowerFourCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseLowerFourCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseLowerFourTailTaylor.lean \
            --pattern BoundaryComputedPhasedBaseLowerFourCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseLowerFourCompactTaylorPackets.lean
      - name: Five-block support-transition compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-full-five-compact
          python scripts/generate_computed_phased_base_full_five_compact_shards.py \
            --output-dir /tmp/computed-phased-base-full-five-compact
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-full-five-compact \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseFullFiveCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseFullFiveCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseFullFiveTailTaylor.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveCompactTaylorPackets.lean
      - name: FullFive InnerOne descent compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-full-five-inner-one
          python scripts/generate_computed_phased_base_full_five_inner_one_compact_shards.py \
            --output-dir /tmp/computed-phased-base-full-five-inner-one
          python scripts/generate_computed_phased_base_full_five_inner_certificates.py \
            --layer One \
            --output-dir /tmp/computed-phased-base-full-five-inner-one
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-full-five-inner-one \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseFullFiveInnerOneCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseFullFiveInnerOneCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerOneTailTaylor.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerOneCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerOneCompactTaylorPackets.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerOneCertificate.lean
      - name: FullFive InnerTwo descent compiler drift gate
        run: |
          rm -rf /tmp/computed-phased-base-full-five-inner-two
          python scripts/generate_computed_phased_base_full_five_inner_two_compact_shards.py \
            --output-dir /tmp/computed-phased-base-full-five-inner-two
          python scripts/generate_computed_phased_base_full_five_inner_certificates.py \
            --layer Two \
            --output-dir /tmp/computed-phased-base-full-five-inner-two
          python scripts/check_generated_family.py \
            --generated-dir /tmp/computed-phased-base-full-five-inner-two \
            --tracked-dir RiemannVenue/Venue \
            --pattern 'BoundaryComputedPhasedBaseFullFiveInnerTwoCompactCell*Shard*.lean' \
            --pattern 'BoundaryComputedPhasedBaseFullFiveInnerTwoCompactTaylorCell*.lean' \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerTwoTailTaylor.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerTwoCompactShards.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerTwoCompactTaylorPackets.lean \
            --pattern BoundaryComputedPhasedBaseFullFiveInnerTwoCertificate.lean
      # The floating proposal is intentionally not portable proof authority.
      # CI instead checks candidate/generator/configuration hashes plus
      # per-cell, per-regime, and aggregate exact-rational budget identities.
      - name: Base-transform budget artifact integrity gate
        run: python scripts/probe_computed_phased_base_transform_budget.py --check
      - name: Validate and execute notebooks
        run: python scripts/check_notebooks.py --execute
      # Drift gate: executed notebooks are committed textual/numeric evidence,
      # so rerunning them must not change their tracked JSON. Plot image bytes
      # are normalized out here and covered by the figure drift gate below.
      - name: Notebook drift gate
        run: git diff --exit-code -- notebooks/*.ipynb
      - name: Regenerate figures
        run: python scripts/export_figures.py
      # Drift gate: the five deterministic claim-figures must byte-match the
      # committed artifacts (requirements.txt is pinned exactly to make
      # matplotlib output reproducible). Expedition figures (lambda-min-*)
      # are long-compute artifacts regenerated by their own scripts and are
      # deliberately not gated here — see scripts/export_figures.py docstring.
      - name: Figure drift gate
        run: |
          git diff --exit-code -- \
            figures/gcd-kernel-spectrum.png \
            figures/euler-shadows.png \
            figures/nonradon-mass.png \
            figures/kakutani-threshold.png \
            figures/radial-derivative.png

  exhibits:
    name: Compile Typst exhibits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Typst
        run: |
          curl -sSfL https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          echo "$PWD/typst-x86_64-unknown-linux-musl" >> "$GITHUB_PATH"
      # Liberation Sans, matching the environment the committed PDF was
      # rendered in (see exhibits/README.md — Noto Sans is the oracle's font
      # but is deliberately NOT installed, so CI and the committed artifact
      # share a font environment). This job is a compile smoke test; the PDF
      # is environment-sensitive and is not byte-gated.
      - name: Install fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-liberation
      - name: Compile exhibit sheets (smoke test)
        run: |
          if [ -f exhibits/exhibit-sheets.typ ]; then
            typst compile exhibits/exhibit-sheets.typ /tmp/exhibit-sheets-ci.pdf
          else
            echo "no Typst sources yet; skipping"
          fi
      - name: Compile second-edition motion (smoke test)
        run: typst compile --root . essay/motion.typ /tmp/motion-ci.pdf

  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Check the actual change diff, not the (always-clean) working tree.
      # Binary artifacts are excluded via .gitattributes.
      - name: Whitespace / conflict markers on the change diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then
            BASE=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
          fi
          git diff --check "$BASE" HEAD
      # Hidden/bidirectional Unicode guard: git diff --check does not catch
      # this class. Mathematical Unicode is welcome; banned are the invisible
      # and direction-override characters that can render differently from
      # what the compiler sees.
      - name: Hidden and bidirectional Unicode guard
        run: |
          python3 - <<'EOF'
          import pathlib, sys, unicodedata
          banned = {0x202A,0x202B,0x202C,0x202D,0x202E,0x2066,0x2067,0x2068,
                    0x2069,0x200B,0x200C,0x200D,0x200E,0x200F,0xFEFF,0x00AD,
                    0x2060,0x2061,0x2062,0x2063,0x2064}
          bad = []
          for p in pathlib.Path('.').rglob('*'):
              s = str(p)
              if not p.is_file() or any(x in s for x in ('.git/','.lake/','.venv/')):
                  continue
              if p.suffix in ('.pdf','.png','.jpg','.ipynb'):
                  continue
              try:
                  t = p.read_text(encoding='utf-8')
              except (UnicodeDecodeError, PermissionError):
                  continue
              for i, c in enumerate(t):
                  if ord(c) in banned or (unicodedata.category(c) == 'Cc' and c not in '\n\t'):
                      bad.append(f"{p}: offset {i}: U+{ord(c):04X}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("no hidden or bidirectional characters found")
          EOF
